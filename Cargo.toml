[workspace]
members = [
  "realworld-backend-axum",
  "realworld-backend-poem-openapi",
]
default-members = [
  "realworld-backend-axum",
  "realworld-backend-poem-openapi",
]
resolver = "2"

[workspace.package]
description   = "RealWorld backend implementations in Rust"
rust-version  = "1.72.1"
edition       = "2021"
authors       = [ "Heiko Seeberger <git@heikoseeberger.de>" ]
license       = "Apache-2.0"
readme        = "README.md"
homepage      = "https://github.com/hseeberger/realworld-backend"
repository    = "https://github.com/hseeberger/realworld-backend"
documentation = "https://github.com/hseeberger/realworld-backend"
publish       = false

[workspace.dependencies]
anyhow                   = { version = "1.0", features = [ "backtrace" ] }
argon2                   = { version = "0.5" }
base64                   = { version = "0.21" }
clap                     = { version = "4.4", features = [ "derive" ] }
configured               = { version = "0.5" }
console_error_panic_hook = { version = "0.1" }
dioxus                   = { version = "0.4" }
dioxus-logger            = { version = "0.4" }
dioxus-router            = { version = "0.4" }
dioxus-web               = { version = "0.4" }
email_address            = { version = "0.2" }
futures                  = { version = "0.3" }
humantime-serde          = { version = "1.1" }
jwt-simple               = { version = "0.11" }
log                      = { version = "0.4" }
poem                     = { version = "1.3", features = [ "anyhow" ] }
poem-openapi             = { version = "3.0", features = [ "email", "swagger-ui" ] }
regex                    = { version = "1.9" }
reqwest                  = { version = "0.11", features = [ "json", "multipart" ] }
secrecy                  = { version = "0.8", features = [ "serde" ] }
serde                    = { version = "1.0", features = [ "derive" ] }
serde_json               = { version = "1.0" }
sqlx                     = { version = "0.7", features = [ "migrate", "runtime-tokio", "sqlite" ] }
thiserror                = { version = "1.0" }
time                     = { version = "0.3", features = [ "formatting", "parsing", "serde" ] }
tokio                    = { version = "1", features = [ "macros", "rt-multi-thread", "signal" ] }
tracing                  = { version = "0.1", default-features = false }
tracing-subscriber       = { version = "0.3", default-features = false, features = [ "env-filter", "fmt", "json" ] }
url                      = { version = "2.4", features = [ "serde" ] }
uuid                     = { version = "1.4", features = [ "serde", "v7" ] }
